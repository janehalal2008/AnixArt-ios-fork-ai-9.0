name: Build iOS

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - run: brew install swiftlint
      - run: swiftlint --strict 2>&1 || true

  build-sim:
    name: Build Simulator
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - run: xcodebuild -version

      - run: brew install xcodegen xcbeautify

      - run: xcodegen generate

      - run: >
          xcodebuild -resolvePackageDependencies
          -project Anixart.xcodeproj
          -scheme Anixart
          -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages

      - run: >
          xcodebuild build
          -project Anixart.xcodeproj
          -scheme Anixart
          -configuration Debug
          -sdk iphonesimulator
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro Max,OS=latest'
          CODE_SIGNING_ALLOWED=NO
          -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages
          | xcbeautify --report junit --report-path build/report.xml

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Anixart-Simulator
          path: build/
          retention-days: 3

  build-ipa:
    name: Build IPA (unsigned)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - run: xcodebuild -version

      - run: brew install xcodegen xcbeautify

      - run: xcodegen generate

      - run: >
          xcodebuild -resolvePackageDependencies
          -project Anixart.xcodeproj
          -scheme Anixart
          -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -project Anixart.xcodeproj \
            -scheme Anixart \
            -configuration Release \
            -archivePath build/Anixart.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages \
            | xcbeautify

      - name: Export unsigned IPA
        run: |
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath build/Anixart.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcbeautify || echo "exportArchive failed, trying manual packaging"

          if [ ! -f build/ipa/*.ipa ]; then
            echo "Creating IPA manually from .app"
            APP=$(find build/Anixart.xcarchive -name "*.app" | head -1)
            mkdir -p build/ipa/Payload
            cp -r "$APP" build/ipa/Payload/
            cd build/ipa && zip -r ../Anixart.ipa Payload/ && cd ../..
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Anixart-IPA
          path: |
            build/ipa/
            build/*.ipa
            build/Anixart.xcarchive/
          compression-level: 9
          retention-days: 90

      - name: Upload .app for sideloading
        uses: actions/upload-artifact@v4
        with:
          name: Anixart-App
          path: build/Anixart.xcarchive/Products/Applications/
          retention-days: 90
