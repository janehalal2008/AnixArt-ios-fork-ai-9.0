name: Build iOS

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - run: brew install swiftlint
      - run: swiftlint --strict 2>&1 || true

  build-sim:
    name: Build Simulator
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - run: xcodebuild -version

      - run: brew install xcodegen xcbeautify

      - run: xcodegen generate

      - run: >
          xcodebuild -resolvePackageDependencies
          -project Anixart.xcodeproj
          -scheme Anixart
          -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages

      - run: >
          xcodebuild build
          -project Anixart.xcodeproj
          -scheme Anixart
          -configuration Debug
          -sdk iphonesimulator
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro Max,OS=latest'
          CODE_SIGNING_ALLOWED=NO
          -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages
          | xcbeautify --report junit --report-path build/report.xml

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Anixart-Simulator
          path: build/
          retention-days: 3

  build-ipa:
    name: Build IPA (unsigned)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - run: xcodebuild -version
      - run: xcodebuild -showsdks | grep iOS

      - run: brew install xcodegen xcbeautify

      - run: xcodegen generate

      - run: >
          xcodebuild -resolvePackageDependencies
          -project Anixart.xcodeproj
          -scheme Anixart
          -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages

      - name: Install iOS 18.2 runtime & build
        run: |
          set -e
          # Install iOS 18.2 Simulator runtime (needed for generic/platform=iOS destination)
          echo "=== Installing iOS 18.2 runtime ==="
          RUNTIME_PATH="/Applications/Xcode_16.2.app/Contents/Developer/Platforms/iPhoneOS.platform/Library/Developer/CoreSimulator/Profiles/Runtimes/iOS.simruntime"
          if [ -d "$RUNTIME_PATH" ]; then
            xcrun simctl runtime add "$RUNTIME_PATH" 2>&1 || echo "runtime already installed or not needed"
          else
            echo "Runtime not found at $RUNTIME_PATH, trying alternative paths..."
            find /Applications -name "*.simruntime" -type d 2>/dev/null | head -5
          fi

          # Also try downloading
          xcversion simulators --install='iOS 18.2' 2>&1 || true

          # Show what's available now
          echo "=== Available runtimes ==="
          xcrun simctl list runtimes

          echo "=== Build for device ==="
          mkdir -p build/device
          xcodebuild build \
            -project Anixart.xcodeproj \
            -scheme Anixart \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -clonedSourcePackagesDirPath ~/Library/Caches/com.apple.dt.Xcode/SourcePackages \
            CONFIGURATION_BUILD_DIR=$PWD/build/device

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH=$(find build/device -name "Anixart.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error:: .app not found"
            exit 1
          fi
          echo "Found .app: $APP_PATH"
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r ../Anixart.ipa Payload/ -x "*.DS_Store"
          cd ../..
          echo "IPA size: $(ls -lh build/Anixart.ipa | awk '{print $5}')"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Anixart-IPA
          path: |
            build/Anixart.ipa
            build/device/
          compression-level: 0
          retention-days: 90
