name: Anixart
options:
  bundleIdPrefix: com.swiftsoft
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  groupSortPosition: top
  usesTabs: false
  saveToProjectFolder: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: "Anixart/Resources/Info.plist"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: Apple Development
    PRODUCT_BUNDLE_IDENTIFIER: com.swiftsoft.anixartd

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.0.0

targets:
  Anixart:
    type: application
    platform: iOS
    sources:
      - path: Anixart
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftsoft.anixartd
        INFOPLIST_FILE: Anixart/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - sdk: WebKit.framework
      - sdk: AVKit.framework
      - sdk: UserNotifications.framework
      - sdk: AuthenticationServices.framework
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint >/dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
